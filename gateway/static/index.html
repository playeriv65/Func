<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Func</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        },
                        success: '#22c55e',
                        error: '#ef4444',
                        warning: '#f59e0b',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                },
            },
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #333;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .animate-pulse-slow {
            animation: pulse 1.5s infinite;
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease;
        }
        .animate-spin-slow {
            animation: spin 1s linear infinite;
        }

        /* Toast animation */
        .toast-enter {
            animation: slideDown 0.3s ease forwards;
        }

        /* Tool call content animation */
        .tool-content {
            transition: max-height 0.35s ease-out, opacity 0.2s ease-out;
        }
        .tool-content.collapsed {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        /* Focus ring */
        .focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* Markdown styles */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 { font-size: 16px; border-bottom: 1px solid var(--tw-border-opacity, 1); padding-bottom: 4px; }
        .markdown-body h2 { font-size: 14px; }
        .markdown-body h3 { font-size: 13px; }
        .markdown-body p { margin-bottom: 12px; }
        .markdown-body ul,
        .markdown-body ol { margin-bottom: 12px; padding-left: 24px; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #2563eb;
        }
        .dark .markdown-body code {
            background: #1a1a1a;
            color: #3b82f6;
        }
        .markdown-body pre {
            background: #1f2937;
            color: #f3f4f6;
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        /* Log output */
        .log-output {
            background: #1f2937;
            color: #e5e7eb;
            padding: 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            line-height: 1.6;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-output .log-line { white-space: pre-wrap; word-break: break-all; }
        .log-output .log-line.install { color: #9ca3af; }
        .log-output .log-line.success { color: #4ade80; }
        .log-output .log-line.error { color: #f87171; }
    </style>
</head>
<body class="bg-white dark:bg-black text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden font-sans transition-colors duration-200">

    <!-- Header -->
    <header class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center justify-between flex-shrink-0 h-14">
        <div class="flex items-center gap-3">
            <svg class="w-6 h-6 text-blue-600 dark:text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <span class="text-sm font-semibold text-gray-900 dark:text-white">Magic Func</span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Status Badge -->
            <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-gray-700">
                <span id="statusDot" class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                <span id="statusText">就绪</span>
            </div>
            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="flex items-center gap-1.5 px-2 py-1 rounded-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-white dark:hover:bg-gray-700 hover:border-gray-300 dark:hover:border-gray-600 transition-all duration-150">
                <svg id="themeIcon" class="w-4 h-4 text-gray-500 dark:text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="4" class="sun-icon hidden dark:block"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" class="sun-rays hidden dark:block"/>
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79" class="moon-icon block dark:hidden"/>
                </svg>
                <span id="themeText" class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide">自动</span>
            </button>
            <!-- Mode Switch -->
            <button id="modeSwitch" onclick="toggleMode()" class="flex items-center gap-1.5 px-2 py-1 rounded-lg bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-white dark:hover:bg-gray-700 hover:border-gray-300 dark:hover:border-gray-600 transition-all duration-150 cursor-pointer">
                <span class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">复杂模式</span>
                <div id="modeToggle" class="w-9 h-4.5 bg-gray-400 dark:bg-gray-600 rounded-full relative transition-colors duration-200">
                    <div id="modeToggleDot" class="absolute top-0.5 left-0.5 w-3.5 h-3.5 bg-white rounded-full transition-transform duration-200"></div>
                </div>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex-1 grid grid-cols-[280px_1fr_280px] overflow-hidden bg-gray-200 dark:bg-gray-800">

        <!-- Left Panel - Input Files -->
        <div class="flex flex-col overflow-hidden bg-white dark:bg-black border-r border-gray-200 dark:border-gray-800">
            <!-- Panel Header -->
            <div class="px-3 py-2 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 flex items-center justify-between flex-shrink-0 h-10">
                <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">输入文件</span>
                <span id="fileCount" class="text-xs font-normal text-gray-400 dark:text-gray-500 bg-gray-200 dark:bg-gray-800 px-2 py-0.5 rounded-full">0</span>
            </div>
            <!-- Panel Content -->
            <div class="flex-1 overflow-y-auto p-3">
                <!-- Upload Zone -->
                <div id="uploadZone" class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-xl p-6 text-center cursor-pointer transition-all duration-200 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/10 mb-3 bg-gray-50 dark:bg-gray-900">
                    <svg class="w-9 h-9 mx-auto mb-2 text-gray-400 dark:text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <div class="text-sm font-medium text-gray-700 dark:text-gray-300">拖拽文件到此处</div>
                    <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">或点击上传</div>
                </div>
                <input type="file" id="fileInput" multiple class="hidden">
                <!-- File List -->
                <div id="inputFileList" class="flex flex-col gap-2">
                    <div class="text-center text-gray-400 dark:text-gray-500 py-8">
                        <div class="text-sm">暂无输入文件</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Center Panel -->
        <div id="centerPanel" class="flex flex-col overflow-hidden bg-white dark:bg-black relative">

            <!-- Simple Mode - Instruction Panel -->
            <div id="simplePanel" class="flex-1 flex flex-col items-center justify-center p-6">
                <div class="w-full max-w-2xl flex flex-col gap-4">
                    <div class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-center">输入指令</div>
                    <div class="relative">
                        <textarea
                            id="instruction"
                            class="w-full min-h-[160px] p-4 pr-16 border border-gray-200 dark:border-gray-700 rounded-xl resize-y font-sans text-sm leading-relaxed text-gray-900 dark:text-gray-100 bg-gray-50 dark:bg-gray-900 transition-all duration-150 focus-ring focus:border-blue-500 dark:focus:border-blue-400 placeholder:text-gray-400 dark:placeholder:text-gray-600"
                            placeholder="输入指令，例如：
把这个文档转换成 PDF 格式
分析 data.csv 并生成统计报告
提取图片中的文字内容..."
                            rows="5"></textarea>
                        <button id="runBtn" onclick="executeTask()" class="absolute right-2 bottom-2 w-11 h-11 rounded-lg bg-blue-600 hover:bg-blue-700 text-white flex items-center justify-center transition-all duration-150 hover:scale-105 shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:shadow-none">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="text-xs text-gray-400 dark:text-gray-500 text-center">按 Enter 运行，Shift + Enter 换行</div>
                </div>
            </div>

            <!-- Complex Mode - Chat Messages -->
            <div id="chatMessages" class="hidden flex-1 overflow-y-auto flex flex-col gap-6 p-6">
                <div class="flex flex-col gap-1 items-start animate-fade-in">
                    <div class="max-w-full">
                        <div class="text-sm leading-relaxed text-gray-800 dark:text-gray-200">
                            你好！我是你的 AI 助手。<br><br>
                            在左侧上传文件，然后在下方输入指令，我会帮你完成任务。<br><br>
                            <strong>复杂模式</strong>会显示完整的执行过程和 agent 输出。
                        </div>
                    </div>
                    <div class="text-xs text-gray-400 dark:text-gray-500">刚刚</div>
                </div>
            </div>

            <!-- Complex Mode - Chat Input -->
            <div id="chatInputContainer" class="hidden border-t border-gray-200 dark:border-gray-800 p-4 bg-white dark:bg-black flex-shrink-0">
                <div class="relative mb-2">
                    <textarea
                        id="chatInstruction"
                        class="w-full py-3 px-4 pr-14 border border-gray-200 dark:border-gray-700 rounded-xl text-sm resize-none font-sans bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-[52px] max-h-[200px] transition-all duration-150 focus-ring focus:border-blue-500 dark:focus:border-blue-400 placeholder:text-gray-400 dark:placeholder:text-gray-600"
                        placeholder="输入指令，例如：把这个文档转换成 PDF 格式..."
                        rows="1"></textarea>
                    <button id="sendBtn" onclick="executeTaskComplex()" class="absolute right-1.5 bottom-1.5 w-10 h-10 rounded-lg bg-blue-600 hover:bg-blue-700 text-white flex items-center justify-center transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="text-xs text-gray-400 dark:text-gray-500 text-center">按 Enter 发送，Shift + Enter 换行</div>
            </div>
        </div>

        <!-- Right Panel - Output Files -->
        <div class="flex flex-col overflow-hidden bg-white dark:bg-black border-l border-gray-200 dark:border-gray-800">
            <!-- Panel Header -->
            <div class="px-3 py-2 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 flex items-center justify-between flex-shrink-0 h-10">
                <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">输出文件</span>
                <span id="outputCount" class="text-xs font-normal text-gray-400 dark:text-gray-500 bg-gray-200 dark:bg-gray-800 px-2 py-0.5 rounded-full">0</span>
            </div>
            <!-- Panel Content -->
            <div class="flex-1 overflow-y-auto p-3">
                <div id="outputFileList" class="flex flex-col gap-2">
                    <div class="text-center text-gray-400 dark:text-gray-500 py-8">
                        <svg class="w-10 h-10 mx-auto mb-3 text-gray-300 dark:text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                        <div class="text-sm">暂无输出文件</div>
                        <div class="text-xs mt-2 opacity-70">任务完成后文件将显示在这里</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 shadow-xl flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300 z-50 max-w-[90%]">
        <svg id="toastIcon" class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="toastMessage" class="text-sm font-medium text-gray-900 dark:text-gray-100">任务完成</span>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
